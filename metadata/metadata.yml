name: 3D FISH ROI-quality labeling
description: Interactive (Ubuntu cloud-workstation) capsule to human-label 3-D HCR
  cell ROI quality (good / bad_ok / bad / merged). Reads the inference outputs + prior
  label assets, and writes each labeling session as its own timestamped label asset
  (merged newest-wins downstream by the training capsule).
